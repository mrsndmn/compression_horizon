name: Build Paper

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'paper/**'
      - '.github/workflows/paper.yml'
  push:
    branches: [main]
    paths:
      - 'paper/**'
      - '.github/workflows/paper.yml'

env:
  TINYTEX_DIR: /home/jovyan/.TinyTeX
  TEX_BIN: /home/jovyan/.TinyTeX/bin/x86_64-linux
  TEX_PACKAGES: >-
    collection-latexrecommended
    collection-mathscience
    collection-fontsrecommended
    microtype graphics subcaption booktabs ulem cancel
    pgf hyperref amsfonts cleveref todonotes xcolor lipsum
    psnfss mathtools amscls etoolbox tools caption float listings
    url enumitem multirow algorithms algorithmicx fancyhdr
    pdftexcmds infwarerr kvoptions ltxcmds forloop

jobs:
  build-paper:
    runs-on: self-hosted
    outputs:
      short_sha: ${{ steps.meta.outputs.short_sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Cache TinyTeX installation
        id: cache-tinytex
        uses: actions/cache@v4
        with:
          path: ${{ env.TINYTEX_DIR }}
          key: tinytex-pdflatex-paper-v1-${{ hashFiles('.github/workflows/paper.yml') }}
          restore-keys: |
            tinytex-pdflatex-paper-v1-

      - name: Install TinyTeX and TeX packages
        if: steps.cache-tinytex.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          if [ ! -x "${TEX_BIN}/pdflatex" ]; then
            tmpdir="$(mktemp -d)"
            curl -fsSL "https://yihui.org/tinytex/install-bin-unix.sh" -o "${tmpdir}/install-tinytex.sh"
            sh "${tmpdir}/install-tinytex.sh"
            rm -rf "${tmpdir}"
          fi
          "${TEX_BIN}/tlmgr" install ${TEX_PACKAGES} || true
          "${TEX_BIN}/pdflatex" --version | head -1

      - name: Verify pdflatex
        run: |
          "${TEX_BIN}/pdflatex" --version | head -1

      - name: Build paper PDF
        working-directory: paper
        run: |
          set -euo pipefail
          "${TEX_BIN}/latexmk" -pdf -interaction=nonstopmode -halt-on-error example_paper.tex
          ls -la example_paper.pdf

      - name: Compute build metadata
        id: meta
        run: echo "short_sha=${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"

      - name: Upload to Yandex Object Storage
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${AWS_ACCESS_KEY_ID:-}" ] || [ -z "${AWS_SECRET_ACCESS_KEY:-}" ]; then
            echo "AWS_ACCESS_KEY_ID or AWS_SECRET_ACCESS_KEY not configured; skipping S3 upload."
            exit 0
          fi
          unset http_proxy https_proxy HTTP_PROXY HTTPS_PROXY
          ls -la paper/example_paper.pdf
          /home/jovyan/.mlspace/envs/compression_horizon/bin/s3cmd \
            -c /dev/null \
            --host=storage.yandexcloud.net \
            --host-bucket='%(bucket)s.storage.yandexcloud.net' \
            --region=ru-central1 \
            put ./paper/example_paper.pdf s3://papers-drafts/progressive_cramming.pdf
